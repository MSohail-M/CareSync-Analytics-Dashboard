<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareSync Analytics – Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F4F3EE;
      color: #1B4F8C;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    img { width: 160px; opacity: 0.85; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { font-size: 0.95rem; color: #4a6fa5; max-width: 280px; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.6rem 1.6rem;
      background: #1B4F8C;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img src="/caresync-logo.png" alt="CareSync" />
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. Call data will sync automatically when you're back online.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
